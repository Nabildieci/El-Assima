name: CarteNabil-iOS-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'

      - name: Clean & Rebuild iOS
        run: |
          flutter config --no-analytics
          rm -rf ios/
          flutter create --project-name=carte_nabil --platforms=ios .
          flutter pub get

      - name: Add Camera Permission
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSCameraUsageDescription string 'Scan cartes membres'" ios/Runner/Info.plist || true

      - name: Install Pods
        run: |
          cd ios
          pod install
          cd ..

      - name: Build iOS
        run: flutter build ios --release --no-codesign

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: CarteNabil-iOS-App
          path: build/ios/iphoneos/Runner.app

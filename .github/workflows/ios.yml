name: CarteNabil-iOS-Build

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Regenerate Platforms
        run: |
          flutter clean
          rm -rf ios/Pods ios/Podfile.lock
          flutter create --project-name=carte_nabil --platforms=ios,web,android .
          flutter pub get
          # Ensure camera permissions are added to Info.plist
          mkdir -p ios/Runner
          if [ -f ios/Runner/Info.plist ]; then
            ruby -i -pe 'gsub(/<dict>/, "<dict>\n<key>NSCameraUsageDescription</key>\n<string>Scan de cartes de membres</string>\n<key>NSMicrophoneUsageDescription</key>\n<string>Utilisation du micro pour le scanner</string>")' ios/Runner/Info.plist
          fi
          # Force iOS 13.0 and Clean Flags by overwriting Podfile entirely (ULTRA-AGGRESSIVE)
          mkdir -p ios
          ruby -e 'File.write("ios/Podfile", <<~"PODFILE"
            platform :ios, "13.0"
            ENV["COCOAPODS_DISABLE_STATS"] = "true"
            project "Runner", {
              "Debug" => :debug,
              "Profile" => :release,
              "Release" => :release,
            }
            def flutter_root
              generated_xcode_build_settings_path = File.expand_path(File.join("..", "Flutter", "Generated.xcconfig"), __FILE__)
              File.foreach(generated_xcode_build_settings_path) do |line|
                matches = line.match(/FLUTTER_ROOT=(.*)/)
                return matches[1].strip if matches
              end
              raise "FLUTTER_ROOT not found"
            end
            require File.expand_path(File.join(flutter_root, "packages", "flutter_tools", "bin", "podhelper"))
            flutter_ios_podfile_setup
            target "Runner" do
              use_frameworks!
              use_modular_headers!
              flutter_install_all_ios_pods File.dirname(File.realpath(__FILE__))
            end
            post_install do |installer|
              installer.pods_project.targets.each do |target|
                flutter_additional_ios_build_settings(target)
                target.build_configurations.each do |config|
                  # 🔥 Nettoyage COMPLET des flags -G récurrents
                  %w[OTHER_CFLAGS OTHER_CPLUSPLUSFLAGS OTHER_LDFLAGS].each do |flag|
                    if config.build_settings[flag]
                      config.build_settings[flag] = config.build_settings[flag].reject { |f| f.include?("-G") }
                    end
                  end
                  config.build_settings["IPHONEOS_DEPLOYMENT_TARGET"] = "13.0"
                end
              end
            end
          PODFILE
          )'

      - name: Install Pods + Patch -G
        run: |
          cd ios
          pod install
          # 🔥 SUPPRESSION GLOBALE DU FLAG -G (après génération)
          find Pods -name "*.xcconfig" -type f -exec sed -i '' 's/-G//g' {} + || true
          sed -i '' 's/-G//g' Pods/**/*.xcconfig || true
          cd ..

      - name: Build iOS (No Codesign)
        run: |
          flutter build ios --release --no-codesign

      - name: Upload iOS App Bundle
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-App-iOS
          path: build/ios/iphoneos/Runner.app

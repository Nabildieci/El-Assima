# Trigger Build Final v3
name: CarteNabil-Android-Build-APK-Final

on:
  push:
    branches:
      - main
      - master
      - trigger-build-v3
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Create Android Native Folders
        run: |
          flutter create --org com.supportclub.carte --project-name carte_nabil . --platforms=android --no-overwrite

      - name: Configure Android Build (Hardened R8 Fix)
        run: |
          # 1. Patch settings.gradle
          cat > android/settings.gradle <<EOF
          pluginManagement {
              def flutterSdkPath = {
                  def properties = new Properties()
                  file("local.properties").withInputStream { properties.load(it) }
                  def flutterSdkPath = properties.getProperty("flutter.sdk")
                  if (flutterSdkPath == null) throw new GradleException("flutter.sdk not set in local.properties")
                  return flutterSdkPath
              }()

              includeBuild("\$flutterSdkPath/packages/flutter_tools/gradle")

              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }

          plugins {
              id "dev.flutter.flutter-gradle-plugin" version "1.0.0" apply false
              id "com.android.application" version "8.2.1" apply false
              id "org.jetbrains.kotlin.android" version "1.9.24" apply false
              id "com.google.gms.google-services" version "4.4.1" apply false
          }

          include ":app"
          EOF

          # 2. Patch root build.gradle - FORCE R8 VERSION
          cat > android/build.gradle <<EOF
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  // FORCE R8 8.3.37 to support Sealed Classes / Kotlin 1.9
                  classpath 'com.android.tools:r8:8.3.37'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF

          # 3. Patch app/build.gradle
          cat > android/app/build.gradle <<EOF
          plugins {
              id "com.android.application"
              id "org.jetbrains.kotlin.android"
              id "dev.flutter.flutter-gradle-plugin"
              id "com.google.gms.google-services"
          }

          android {
              namespace = "com.supportclub.carte"
              compileSdk = 34

              defaultConfig {
                  applicationId = "com.supportclub.carte"
                  minSdk = 24
                  targetSdk = 34
                  versionCode = 1
                  versionName = "1.0.0"
              }

              buildTypes {
                  release {
                      signingConfig = signingConfigs.debug
                      minifyEnabled = false
                      shrinkResources = false
                  }
              }
          }

          flutter {
              source = "../.."
          }
          EOF

      - name: Inject Google Services JSON
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON_BASE64 secret not found."
          fi

      - name: Build APK Release
        run: |
          flutter pub get
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk

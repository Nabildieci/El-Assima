# Trigger Build Final v5
name: CarteNabil-Android-Build-APK-Final

on:
  push:
    branches:
      - main
      - master
      - trigger-build-v3
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.3'
          channel: 'stable'

      - name: Re-Generate Android Project
        run: |
          # On supprime le dossier android pour etre sur de repartir a zero
          rm -rf android
          flutter create --org com.supportclub.carte --project-name carte_nabil . --platforms=android

      - name: Patch Android Configuration
        run: |
          # 1. Patch settings.gradle (Force Kotlin 1.9.24 and Google Services)
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24" apply false/g' android/settings.gradle
          sed -i '/plugins {/a \    id "com.google.gms.google-services" version "4.4.1" apply false' android/settings.gradle

          # 2. Patch root build.gradle (Force R8 8.3.37)
          sed -i '/dependencies {/a \        classpath "com.android.tools:r8:8.3.37"' android/build.gradle

          # 3. Patch app/build.gradle (ApplicationId, Namespace, Java 17, Google Services)
          # On ajoute le plugin google-services
          sed -i '/id "dev.flutter.flutter-gradle-plugin"/a \    id "com.google.gms.google-services"' android/app/build.gradle
          
          # Fix ApplicationId & Namespace (parfois flutter create met des valeurs differentes)
          sed -i 's/applicationId = .*/applicationId = "com.supportclub.carte"/g' android/app/build.gradle
          sed -i 's/namespace = .*/namespace = "com.supportclub.carte"/g' android/app/build.gradle
          
          # Fix SDKs
          sed -i 's/minSdk = .*/minSdk = 24/g' android/app/build.gradle
          sed -i 's/targetSdk = .*/targetSdk = 34/g' android/app/build.gradle
          
          # Fix Java 17 / JVM Target
          # On cherche compileOptions et on remplace
          sed -i '/compileOptions {/,/}/c \    compileOptions {\n        sourceCompatibility JavaVersion.VERSION_17\n        targetCompatibility JavaVersion.VERSION_17\n    }' android/app/build.gradle
          sed -i '/kotlinOptions {/,/}/c \    kotlinOptions {\n        jvmTarget = "17"\n    }' android/app/build.gradle

          # 4. Finalizing manifest
          sed -i 's/android:label=".*"/android:label="ASSIMA-10"/' android/app/src/main/AndroidManifest.xml

      - name: Inject Google Services JSON
        run: |
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON_BASE64 secret not found."
          fi

      - name: Build APK Release
        run: |
          flutter pub get
          flutter build apk --release --target-platform android-arm64

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-Final-APK
          path: build/app/outputs/flutter-apk/app-release.apk

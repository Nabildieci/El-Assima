name: CarteNabil-Android-Build-APK-Final

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'

      - name: Create Android Native Folders
        run: |
          # On s'assure que le projet est propre
          flutter create --org com.supportclub.carte --project-name carte_nabil . --platforms=android --no-overwrite

      - name: Configure Android Build (Gradle & Kotlin)
        run: |
          cat > android/build.gradle <<EOF
          buildscript {
              ext.kotlin_version = '1.9.24'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.1'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:\$kotlin_version"
                  classpath 'com.android.tools:r8:8.3.37'
                  classpath 'com.google.gms:google-services:4.4.1'
              }
          }

          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }

          rootProject.buildDir = '../build'
          subprojects {
              project.buildDir = "\${rootProject.buildDir}/\${project.name}"
          }
          subprojects {
              project.evaluationDependsOn(':app')
          }

          tasks.register("clean", Delete) {
              delete rootProject.buildDir
          }
          EOF
          # Correction de la version Kotlin dans settings.gradle
          sed -i 's/id "org.jetbrains.kotlin.android" version "[^"]*"/id "org.jetbrains.kotlin.android" version "1.9.24"/g' android/settings.gradle || true

      - name: Inject Google Services JSON
        run: |
          # On injecte le secret BASE64 dans le fichier (si disponible)
          if [ -n "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" ]; then
            echo "${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}" | base64 --decode > android/app/google-services.json
          else
            echo "Warning: GOOGLE_SERVICES_JSON_BASE64 secret not found. Build may fail if Firebase is used."
          fi

      - name: Set Release Permissions & App Name
        run: |
          # Correction du Package Name
          sed -i 's/package=".*"/package="com.supportclub.carte"/' android/app/src/main/AndroidManifest.xml
          
          # Nettoyage des anciennes permissions pour éviter les doublons avant injection
          sed -i '/<uses-permission/d' android/app/src/main/AndroidManifest.xml
          
          # Injection propre des permissions après le tag manifest
          sed -i '/<manifest/a \    <uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.ACCESS_NETWORK_STATE" />\n    <uses-permission android:name="android.permission.CAMERA" />\n    <uses-permission android:name="android.permission.RECORD_AUDIO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.READ_MEDIA_IMAGES" />\n    <uses-permission android:name="android.permission.READ_MEDIA_VIDEO" />' android/app/src/main/AndroidManifest.xml
          
          # Configuration Application : Cleartext et Label Final
          sed -i 's/<application/<application android:usesCleartextTraffic="true"/' android/app/src/main/AndroidManifest.xml
          sed -i 's/android:label=".*"/android:label="ASSIMA-10"/' android/app/src/main/AndroidManifest.xml

      - name: Finalize SDK Versions & Plugins
        run: |
          # On force le Min SDK à 23 pour la compatibilité NDI/Camera
          sed -i 's/minSdkVersion .*/minSdkVersion 23/g' android/app/build.gradle
          sed -i 's/flutter.minSdkVersion/23/g' android/app/build.gradle
          # Nettoyage agresif du Manifest (supprime tout minSdkVersion persistant)
          sed -i '/android:minSdkVersion="[0-9]*"/d' android/app/src/main/AndroidManifest.xml

          # On s'assure que le Target SDK est à 34
          if grep -q "targetSdkVersion" android/app/build.gradle; then
            sed -i 's/targetSdkVersion .*/targetSdkVersion 34/g' android/app/build.gradle
          else
            sed -i '/defaultConfig {/a \        targetSdkVersion 34' android/app/build.gradle
          fi

          # Application du plugin Google Services
          if ! grep -q "com.google.gms.google-services" android/app/build.gradle; then
            echo "apply plugin: 'com.google.gms.google-services'" >> android/app/build.gradle
          fi

      - name: Build APK Release
        run: |
          flutter pub get
          flutter build apk --release --target-platform android-arm64 --split-per-abi

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: ASSIMA-10-Final-APK
          path: build/app/outputs/flutter-apk/app-release-arm64-v8a-release.apk

name: carte_nabil
# Trigger CI build for iOS stabilization
description: Specialized Membership Scanner App for ASSIMA-10.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  
  # Firebase
  firebase_core: ^2.28.0
  cloud_firestore: ^4.15.5
  
  # Scanner
  flutter_barcode_scanner: ^2.0.0
  path_provider: ^2.1.2
  shared_preferences: ^2.2.3
  permission_handler: ^11.3.1
  csv: ^6.0.0
  share_plus: ^10.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
